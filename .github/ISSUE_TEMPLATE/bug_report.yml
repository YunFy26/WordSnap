name: Bug report
description: 报告可复现的问题或平台兼容性故障
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿粘贴 API Key、私人选中文本或未经脱敏的日志。安全漏洞请按照 SECURITY.md 私密报告。
  - type: input
    id: version
    attributes:
      label: WordSnap 版本
      description: 可填写 Release 版本或 commit SHA。
      placeholder: 例如 0.1.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Linux
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期待什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动 WordSnap
        2. 选中文本
        3. 按下快捷键
        4. 观察到……
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可提供已脱敏的截图、错误信息、接口类型和桌面环境。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，没有找到相同问题。
          required: true
        - label: 我已移除 API Key、私人文本和其他敏感信息。
          required: true
        - label: 这不是需要私密披露的安全漏洞。
          required: true
