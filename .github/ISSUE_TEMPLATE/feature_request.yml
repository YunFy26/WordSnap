name: Feature request
description: 提议符合 WordSnap 产品边界的改进
title: "[Feature]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        WordSnap 优先保持小而可靠。请从用户问题出发，避免只描述一个实现方案。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 谁在什么场景下遇到了什么困难？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述最小可行方案，以及它如何融入划词翻译流程。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否可以通过现有设置、外部工具或更小的改动解决？
  - type: textarea
    id: impact
    attributes:
      label: 隐私与平台影响
      description: 是否影响网络请求、本地数据、剪贴板、快捷键或跨平台行为？
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，没有找到相同提议。
          required: true
        - label: 我理解维护者可能为了保持项目边界而拒绝功能扩张。
          required: true
