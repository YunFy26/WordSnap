name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish (${{ matrix.platform }} ${{ matrix.targetName }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            targetName: macOS Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            targetName: macOS Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            targetName: Linux x64
            args: ""
          - platform: windows-latest
            targetName: Windows x64
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: wordsnap-v__VERSION__-build-${{ github.run_number }}
          releaseName: WordSnap v__VERSION__ build ${{ github.run_number }}
          releaseBody: |
            Automated WordSnap release from commit ${{ github.sha }}.

            Download the asset that matches your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
